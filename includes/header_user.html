<link rel="stylesheet" href="../assets/css/defaut/header_user.css">
<link rel="stylesheet" href="../assets/css/user/user_thongbao.css">
<link rel="stylesheet" href="../assets/fonts/fontawesome/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<header id="header_user">
    <div id="menu">
        <i class="fa-solid fa-bars"></i>
    </div>
    <div>
        <div id="notifications">
            <button id="notif-trigger" aria-label="Thông báo" type="button">
                <i class="fa-solid fa-bell"></i>
                <span class="notif-badge" aria-hidden="true" style="display: none;">0</span>
            </button>
            <div id="notif-panel" aria-live="polite" aria-label="Danh sách thông báo">
                <div class="notif-header">Thông báo</div>
                <ul class="notif-list">
                    <!-- Dữ liệu sẽ được load bởi notifications.js -->
                    <li class="notif-item notif-loading">
                        <p class="notif-text" style="text-align: center; color: #999;">
                            <i class="fa-solid fa-spinner fa-spin"></i> Đang tải thông báo...
                        </p>
                    </li>
                </ul>
            </div>
        </div>
        <div id="user-info">
            <img src=img src="https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png" alt="Ảnh người dùng" />
            <span class="user-name">Đang tải...</span>
        </div>
    </div>
</header>
