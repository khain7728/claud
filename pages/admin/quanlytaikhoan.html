<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Quản lý tài khoản - Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../assets/css/defaut/menu_admin.css">
    <link rel="stylesheet" href="../../assets/css/defaut/header_admin.css">
    <link rel="stylesheet" href="../../assets/css/admin/quanlytaikhoan.css">
</head>

<body id="app-container">

    <div id="placeholder-menu"></div>
    <div id="toast-container"></div>

    <div class="main-wrapper">
        <div id="placeholder-header"></div>

        <div id="content">
            <main class="page-content">

                <div class="page-header">
                    <div class="header-text">
                        <h1 class="page-title">Quản lý tài khoản</h1>
                        <p>Xem và quản lý danh sách người dùng hệ thống</p>
                    </div>
                </div>

                <div class="toolbar">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchUserBox" placeholder="Tìm kiếm tên, email...">
                    </div>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th class="col-stt">STT</th>
                                <th class="text-left sortable" data-sort="name">
                                    Thông tin người dùng <i class="fa-solid fa-sort"></i>
                                </th>
                                <th class="col-date sortable" data-sort="created_at">
                                    Ngày tham gia <i class="fa-solid fa-sort"></i>
                                </th>
                                <th class="col-status sortable" data-sort="status">
                                    Trạng thái <i class="fa-solid fa-sort"></i>
                                </th>
                                <th class="col-action">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="user_table_body"></tbody>
                    </table>
                </div>

                <div class="pagination-container">
                    <ul class="pagination" id="pagination"></ul>
                </div>

            </main>
        </div>
    </div>

    <div id="modalUserDetail" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Hồ sơ người dùng</h2>
                <span id="btnCloseModalHeader" class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="user-profile-header">
                    <div class="avatar-wrapper" title="Bấm để đổi ảnh đại diện" onclick="document.getElementById('avatarUploadInput').click()">
                        <div id="modal_avatar_display"></div>
                        <div class="avatar-overlay">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                    </div>

                    <input type="file" id="avatarUploadInput" accept="image/*" style="display: none;">

                    <div class="profile-basic">
                        <h3 id="modal_fullname">Loading...</h3>
                        <p id="modal_email">Loading...</p>
                        <div class="change-avatar-text" onclick="document.getElementById('avatarUploadInput').click()">
                            <i class="fa-solid fa-pen"></i> Đổi Avatar
                        </div>
                    </div>
                </div>

                <div class="profile-info-grid">
                    <div class="info-item">
                        <label>ID Tài khoản</label>
                        <p id="modal_id">...</p>
                    </div>
                    <div class="info-item">
                        <label>Ngày tham gia</label>
                        <p id="modal_joined">...</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnCloseModalFooter" class="btn-secondary">Đóng</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/admin/layout_admin.js"></script>
    <script src="../../assets/js/admin/quanlytaikhoan.js"></script>
</body>

</html>
