<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/defaut/body.css">
    <link rel="stylesheet" href="../../assets/css/defaut/user_ontap_ketqua.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Ôn Tập Kết Quả - VOCAB</title>
</head>

<body>
    <!-- menu user -->
    <div id="menu_user"></div>

    <!-- header user -->
    <div id="header_user"></div>

    <!-- content -->
    <div id="content">
        <p id="tieu_de_trang">Ôn tập</p>
        <div id="main">
            <!-- nội dung trang sẽ được viết bên trong này -->
            <div id="hoanthanhontap"></div>
            <div id="chucmung">
                <p id="thongbaohoanthanh">Bạn đã hoàn thành ôn tập</p>
                <p id="khen">(Làm tốt lắm)</p>
            </div>
            <div id="frame_hanhdong">
                <p>Hành động tiếp theo</p>
                <div class="hanhdong_tieptheo">
                    <a href="javascript:void(0)" class="hanhdong" id="link-trang-chu">
                        <i class="fa-solid fa-grip"></i>
                        <p>Trang chủ</p>
                    </a>
                    <a href="javascript:void(0)" class="hanhdong" id="link-khoa-hoc">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>Khóa học</p>
                    </a>
                    <a href="javascript:void(0)" class="hanhdong" id="link-luyen-tap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <p>Luyện tập</p>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Script để load menu và header -->
     <!-- Cross-tab Sync Scripts -->
     <script src="../../assets/js/defaut/sync_validator.js"></script>
     <script src="../../assets/js/defaut/sync_manager.js"></script>

     <script src="../../assets/js/defaut/auth_check.js"></script>
    <script src="../../assets/js/user/layout_user.js"></script>
    <script src="../../assets/js/user/user_ontap_ketqua.js"></script>
