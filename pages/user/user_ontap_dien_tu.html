<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/defaut/body.css">
    <link rel="stylesheet" href="../../assets/css/user/user_ontap_dien_tu.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Điền Từ Ôn Tập - VOCAB</title>
</head>

<body>
    <!-- menu user -->
    <div id="menu_user"></div>

    <!-- header user -->
    <div id="header_user"></div>

    <!-- content -->
    <div id="content">
        <div id="tieu_de_trang">
            <i class="fa-solid fa-pen"></i>
            <p>Điền từ</p>
        </div>
        <div id="main">
            <div class="process">
                <div class="tongsocauhoi">
                    <div class="socauhoihientai"></div>
                </div>
            </div>
            <div id="frame_dientu">
                <span id="cauhoi">Xin chào</span>
                <div id="frame_dapan">
                    <input type="text" name="dapan" id="dapan" autocomplete="off" placeholder="" title="dapan">
                    <p>Vui lòng nhập đáp án</p>
                </div>
            </div>

            <button id="kiemtra">Kiểm tra</button>
            <div id="thaotac">
                <button id="dathuoctunay" title="dathuoctunay">Đã thuộc từ này</button>
                <button id="quentunay" title="quentunay">Quên từ này</button>
                <button id="tieptheo" title="tieptheo">
                    <a href="">Tiếp theo <i class="fa-solid fa-arrow-right"></i></a>
                </button>
            </div>
        </div>
        <!-- Cross-tab Sync Scripts -->
        <script src="../../assets/js/defaut/sync_validator.js"></script>
        <script src="../../assets/js/defaut/sync_manager.js"></script>
        <script src="../../assets/js/defaut/sync_helpers.js"></script>
        
        <script src="../../assets/js/defaut/auth_check.js"></script>
        <!-- Script để load menu và header -->
        <script src="../../assets/js/user/layout_user.js"></script>
        <script src="../../assets/js/user/user_ontap_dien_tu.js"></script>
</body>

</html>
