<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/defaut/body.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/user/khoa_hoc_cong_dong.css">
    <title>Khóa Học Cộng Đồng - VOCAB</title>
</head>

<body>
    <div id="menu_user"></div>

    <div id="header_user"></div>

    <div id="content">
        <div class="khung-tab-chuyen-trang">
            <button id="tab-khoa-hoc-cua-toi" class="tab-chuyen-trang">Khóa học của tôi</button>
            <button id="tab-khoa-hoc-cong-dong" class="tab-chuyen-trang active">Khóa học cộng đồng</button>
        </div>

        <div id="main">
            
            <div class="khung-tieu-de-va-loc">
                <div class="bo-loc-hien-tai" id="bo-loc-hien-tai">
                    <h2 id="tieu-de-loc">Tất cả khóa học</h2>
                    <i class="fa-solid fa-caret-down"></i>
                </div>
                
                <div class="menu-loc-dropdown an" id="menu-loc-dropdown">
                    <div class="lua-chon-loc active" data-filter="tat-ca">
                        <i class="fa-solid fa-check"></i> Tất cả khóa học
                    </div>
                    <div class="lua-chon-loc" data-filter="da-tham-gia">
                        <i class="fa-solid fa-check"></i> Đã tham gia
                    </div>
                    <div class="lua-chon-loc" data-filter="chua-tham-gia">
                        <i class="fa-solid fa-check"></i> Chưa tham gia
                    </div>
                </div>
            </div>

            <div class="khung-tim-kiem">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="thanh-tim-kiem" placeholder="Tìm kiếm khóa học...">
            </div>
            <div id="ket-qua-tim-kiem-text" class="text-ket-qua-tim-kiem"></div>

            <div class="danh-sach-khoa-hoc" id="danh-sach-khoa-hoc-cong-dong">
                </div>

            <div class="khung-phan-trang" id="khung-phan-trang">
                </div>

        </div>
    </div>

    <!-- Cross-tab Sync Scripts -->
    <script src="../../assets/js/defaut/sync_validator.js"></script>
    <script src="../../assets/js/defaut/sync_manager.js"></script>
    <script src="../../assets/js/defaut/sync_helpers.js"></script>
    
    <script src="../../assets/js/defaut/auth_check.js"></script>
    <script src="../../assets/js/user/layout_user.js"></script>
    <script src="../../assets/js/user/khoa_hoc_cong_dong.js"></script>
</body>

</html>
