<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/defaut/index.css">
    <link rel="stylesheet" href="../assets/css/defaut/body.css">
    <link rel="stylesheet" href="../assets/css/defaut/dangnhap.css">
    <link rel="stylesheet" href="../assets/css/defaut/toast-message.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Đăng ký - VOCAB</title>
</head>

<body>
    <!-- header -->
    <div id="header_index"></div>

    <div id="content">
        <!-- Toast Message Container -->
        <div id="toast-container" class="toast-container"></div>
        
        <div class="login-container">
            <h2>Đăng ký</h2>
            <p>Hãy tạo tài khoản của bạn để bắt đầu hành trình học tập.</p>
            
            <!-- Đăng ký -->
            <div class="input-group">
                <div class="name">
                    <label for="name">Tên đầy đủ</label>
                    <input type="text" id="name" placeholder="Nhập tên của bạn">
                </div>
                <div class="email">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn">
                </div>
                <div class="password">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu của bạn">
                </div>
                <div class="confirm-password">
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu của bạn">
                </div>
            </div>
           
            <div class="divider">
                <div class="line-left"></div>
                <span>Hoặc đăng ký bằng</span>
                <div class="line-right"></div>
            </div>

             <!-- đăng ký bằng facebook -->
            <button class="facebook-login-button" onclick="alert('Chức năng đăng nhập bằng Facebook đang được triển khai. Vui lòng đăng ký phương thức khác'); return false;">
                <i class="fa-brands fa-facebook"></i>
                Đăng ký với Facebook
            </button>
            <!-- Đăng ký bằng google -->
            <button class="google-login-button" onclick="window.location.href='../auth/google-login.php'">
                <i class="fa-brands fa-google"></i>
                Đăng ký với Google
            </button>

            <div class="terms">
                <input type="checkbox" id="terms-checkbox">
                <label for="terms-checkbox">Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a></label>
            </div>
            <!-- nút đăng nhập -->
            <button class="login-button">Đăng ký</button>

            <p class="signup-link">Đã có tài khoản? <a href="dangnhap.html">Đăng nhập ngay</a></p>
        </div>
    </div>

    <!-- footer -->
    <div id="footer"></div>

    <script src="../assets/js/defaut/toast-message.js"></script>
    <script src="../assets/js/defaut/include-layout.js" defer></script>
    <script src="../assets/js/defaut/dangky.js" defer></script>
</body>

</html>
