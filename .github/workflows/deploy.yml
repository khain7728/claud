# .github/workflows/deploy.yml
# Deploy VOCABULARY project to InfinityFree via FTP on push to main

name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: samkirkland/ftp-deploy-action@v4
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          local-dir: ./
          exclude: |
            **/.git*
            **/.github*
            **/node_modules*
            **/.env
            **/.env.*
            **/README.md
            **/deploy.php
